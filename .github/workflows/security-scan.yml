name: Security Scan

on:
  workflow_call:
  schedule:
    - cron: '0 18 * * *'   # daily 18:00 UTC — re-scan code against updated YARA rules
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install project
        run: uv sync --dev

      - name: MCP scan (yara)
        env:
          POLARION_URL: https://example.invalid
          POLARION_TOKEN: dummy
        run: |
          set -o pipefail
          uv tool run --python 3.13 --from cisco-ai-mcp-scanner mcp-scanner \
            --analyzers yara --format raw --log-level error \
            stdio --stdio-command uv \
                  --stdio-arg run --stdio-arg mcp-server-polarion \
            | tee scan-result.json

      - name: Summarize findings
        if: always()
        run: |
          python3 .github/scripts/mcp_scan_summary.py
          cat scan-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Comment on PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.fork == false
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          test -s scan-summary.md || exit 0
          gh pr comment "${{ github.event.pull_request.number }}" \
            --body-file scan-summary.md --edit-last --create-if-none

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-scan-report
          path: scan-result.json
          retention-days: 30
          if-no-files-found: warn

  audit:
    # Dependabot covers deps on its own cadence, so skip the audit on the nightly cron.
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Export production-only requirements
        # Scan only the deps that ship in the wheel. Dev/eval-only groups
        # (ruff, mypy, strands-agents, ...) never reach end users via PyPI
        # so their CVEs should not gate publish; Dependabot still tracks
        # them on its own cadence. --no-hashes is required because the OSV
        # scanner's pip parser does not read the multiline hash form.
        run: |
          uv export --no-dev --no-emit-project --no-hashes \
            --format requirements-txt > runtime-requirements.txt

      - name: Scan dependencies for known CVEs (osv-scanner)
        run: |
          set -o pipefail
          curl -sSL -o osv-scanner \
            https://github.com/google/osv-scanner/releases/download/v2.3.8/osv-scanner_linux_amd64
          chmod +x osv-scanner
          ./osv-scanner scan source \
            --lockfile=requirements.txt:runtime-requirements.txt \
            | tee osv-result.txt

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: osv-scan-report
          path: osv-result.txt
          retention-days: 30
          if-no-files-found: warn
