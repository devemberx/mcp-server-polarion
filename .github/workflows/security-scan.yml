name: Security Scan

on:
  schedule:
    - cron: '0 18 * * *'   # daily 18:00 UTC / 03:00 KST
  workflow_dispatch:

permissions:
  contents: read

jobs:
  mcp-scan:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install project
        run: uv sync --dev

      - name: YARA scan (stdio)
        env:
          POLARION_URL: https://example.invalid
          POLARION_TOKEN: dummy
        run: |
          set -o pipefail
          uv tool run --python 3.13 --from cisco-ai-mcp-scanner mcp-scanner \
            --analyzers yara --format raw --log-level error \
            stdio --stdio-command uv \
                  --stdio-arg run --stdio-arg mcp-server-polarion \
            | tee scan-result.json

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mcp-scan-report
          path: scan-result.json
          retention-days: 30
          if-no-files-found: warn
