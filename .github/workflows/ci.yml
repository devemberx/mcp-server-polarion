name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        # Include the evals group so the eval harness' unit tests actually run
        # here (importorskip'd otherwise) — this is the only place pytest runs
        # on a PR; evals.yml is workflow_dispatch-only and never runs pytest.
        run: uv sync --dev --group evals

      - name: Run ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src/

      - name: Run pytest
        run: uv run pytest

  security-scan:
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      pull-requests: write   # let the reusable workflow post the sticky PR comment
