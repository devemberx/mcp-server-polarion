name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Run ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src/

      - name: Run pytest
        run: uv run pytest
