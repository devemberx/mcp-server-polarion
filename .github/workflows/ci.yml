name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0   # diff-cover needs base-branch history

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Install dependencies
        # evals group so the eval harness' unit tests run here
        run: uv sync --dev --group evals

      - name: Run ruff (lint + format check)
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src/

      - name: Run pytest with coverage
        run: |
          uv run pytest \
            --cov=src/mcp_server_polarion --cov=evals \
            --cov-report=xml --cov-report=term-missing \
            --cov-fail-under=90

      - name: Patch coverage
        if: github.event_name == 'pull_request'
        run: |
          uv run diff-cover coverage.xml \
            --compare-branch=origin/${{ github.base_ref }} \
            --fail-under=90

  security-scan:
    uses: ./.github/workflows/security-scan.yml
    permissions:
      contents: read
      pull-requests: write   # reusable workflow posts the sticky PR comment
