name: Evals (on-demand)

# On-demand eval run. Same checks as the publish gate (publish-gate.yml), but
# triggered manually so results can be reviewed before tagging a release. Pick
# a single tier or run all of them.
on:
  workflow_dispatch:
    inputs:
      tier:
        description: "Tier to run"
        default: "all"
        type: choice
        options:
          - all
          - "1"
          - "2"
          - "3"
      model:
        description: "LiteLLM model id (EVAL_MODEL)"
        default: "openai/gpt-4o-mini"
        type: string
      runs:
        description: "Runs per case (EVAL_RUNS)"
        default: "10"
        type: string

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/run-evals
        with:
          tier: ${{ inputs.tier }}
          model: ${{ inputs.model }}
          runs: ${{ inputs.runs }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
