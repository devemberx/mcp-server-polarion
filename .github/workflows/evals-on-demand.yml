name: Evals (on-demand)

# Manual eval run (same checks as publish-gate.yml) to review before tagging.
on:
  workflow_dispatch:
    inputs:
      category:
        description: "Behaviour category to run"
        default: "all"
        type: choice
        options:
          - all
          - triggers
          - safety
          - efficiency
          - orchestration
      model:
        description: "LiteLLM model id (EVAL_MODEL)"
        default: "openai/gpt-4o-mini"
        type: string
      runs:
        description: "Runs per case (EVAL_RUNS)"
        default: "10"
        type: string

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/run-evals
        with:
          category: ${{ inputs.category }}
          model: ${{ inputs.model }}
          runs: ${{ inputs.runs }}
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
