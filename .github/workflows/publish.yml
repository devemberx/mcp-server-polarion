name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  gate:
    # Hard pre-publish eval gate (tier1 -> tier2 -> tier3). Lives in its own
    # file (publish-gate.yml); called here as a blocking job so nothing ships
    # until every tier passes. `secrets: inherit` forwards OPENAI_API_KEY.
    uses: ./.github/workflows/publish-gate.yml
    secrets: inherit

  publish-test:
    needs: gate
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish:
    needs: publish-test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp-registry:
    # Publish the server entry to the official MCP Registry after PyPI succeeds.
    # GitHub OIDC authorises the io.github.devemberx/* namespace, so no secret
    # is needed. The registry validates the PyPI package + its mcp-name marker,
    # hence the wait-for-index step before publishing.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # GitHub OIDC for the io.github.* namespace
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Wait for PyPI to index the new version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 20); do
            curl -fsSL "https://pypi.org/pypi/mcp-server-polarion/${VERSION}/json" >/dev/null 2>&1 \
              && { echo "PyPI has ${VERSION}"; exit 0; }
            echo "waiting for PyPI ${VERSION} ($i)"; sleep 15
          done
          echo "PyPI did not index ${VERSION}"; exit 1

      - name: Inject release version into server.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python3 - "$VERSION" <<'PY'
          import json, sys
          v = sys.argv[1]
          d = json.load(open("server.json"))
          d["version"] = v
          for pkg in d.get("packages", []):
              pkg["version"] = v
          json.dump(d, open("server.json", "w"), indent=2)
          PY

      - name: Install mcp-publisher
        run: |
          curl -L "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_$(uname -s | tr '[:upper:]' '[:lower:]')_$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/').tar.gz" | tar xz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  release:
    # Publish the GitHub Release after PyPI succeeds. Kept independent of
    # publish-mcp-registry (needs: publish, not the registry job): the registry
    # is in preview and may be flaky, and a registry hiccup must not block the
    # release notes. Notes are generated from merged PRs, grouped via
    # .github/release.yml.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create the release

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip if release already exists (idempotent on job re-run).
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 && exit 0
          python3 .github/scripts/build_release_notes.py > "${RUNNER_TEMP}/notes.md"
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${RUNNER_TEMP}/notes.md"
