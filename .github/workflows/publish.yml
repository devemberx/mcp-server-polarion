name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  evals:
    # Tier-1 forbidden-behaviour gate. Blocks publish if the agent takes any
    # destructive / footgun action against the mocked Polarion backend.
    # Requires an OPENAI_API_KEY repository secret; absent, this job fails and
    # deploy is blocked (fail-closed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Install eval dependencies
        run: uv sync --group evals

      - name: Run Tier-1 gate
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          EVAL_MODEL: openai/gpt-4o-mini
          EVAL_RUNS: "10"
        run: uv run python -m evals.run

      - name: Upload Tier-1 report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tier1-report
          path: evals/reports/

  publish-test:
    needs: evals
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish:
    needs: publish-test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
