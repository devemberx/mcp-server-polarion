name: Publish

on:
  push:
    tags:
      - "v*"

jobs:
  gate:
    # secrets: inherit forwards OPENAI_API_KEY to the gate.
    uses: ./.github/workflows/publish-gate.yml
    secrets: inherit

  publish-test:
    needs: gate
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish:
    needs: publish-test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  publish-mcp-registry:
    # Not idempotent: re-tagging an already-published version fails; recover with a
    # new version tag. wait-for-index runs first since the registry validates PyPI.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write  # OIDC for io.github.* namespace
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Wait for PyPI to index the new version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          for i in $(seq 1 20); do
            curl -fsSL "https://pypi.org/pypi/mcp-server-polarion/${VERSION}/json" >/dev/null 2>&1 \
              && { echo "PyPI has ${VERSION}"; exit 0; }
            echo "waiting for PyPI ${VERSION} ($i)"; sleep 15
          done
          echo "PyPI did not index ${VERSION}"; exit 1

      - name: Inject release version into server.json
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version = $v | (.packages[].version) = $v' \
            server.json > server.tmp && mv server.tmp server.json

      - name: Install mcp-publisher
        # Pinned + sha256-checked: this job holds an OIDC token. Bump version and
        # checksum together; runner is always linux/amd64.
        env:
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar xz -f mcp-publisher.tar.gz mcp-publisher

      - name: Authenticate to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        run: ./mcp-publisher publish

  release:
    # needs publish, not the registry, so a flaky registry can't block notes.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create the release

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # idempotent on re-run
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 && exit 0
          python3 .github/scripts/build_release_notes.py > "${RUNNER_TEMP}/notes.md"
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${RUNNER_TEMP}/notes.md"
