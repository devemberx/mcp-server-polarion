name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  evals:
    # Tier-1 forbidden-behaviour gate. Blocks publish if the agent takes any
    # destructive / footgun action against the mocked Polarion backend.
    # Requires an OPENAI_API_KEY repository secret; absent, this job fails and
    # deploy is blocked (fail-closed).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/run-evals
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

  publish-test:
    needs: evals
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish:
    needs: publish-test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    # Publish the GitHub Release only after PyPI succeeds. Notes are generated
    # natively from merged PRs and grouped by label via .github/release.yml.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create the release

    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Idempotent: a job re-run after a transient failure must not collide
          # with an already-created release.
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 && exit 0
          # Categorized notes (grouped per .github/release.yml) plus a Highlights
          # list prepended from the Features section.
          python3 .github/scripts/build_release_notes.py > "${RUNNER_TEMP}/notes.md"
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${RUNNER_TEMP}/notes.md"
