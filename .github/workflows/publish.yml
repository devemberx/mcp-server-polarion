name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

jobs:
  evals:
    # Tier-1 forbidden-behaviour gate. Blocks publish if the agent takes any
    # destructive / footgun action against the mocked Polarion backend.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/run-evals
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}

  publish-test:
    needs: evals
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish:
    needs: publish-test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # Required for trusted publishing

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8

      - name: Set up Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    # Publish the GitHub Release only after PyPI succeeds. Notes are generated
    # natively from merged PRs and grouped by label via .github/release.yml.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Required to create the release

    steps:
      - uses: actions/checkout@v6

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Skip if release already exists (idempotent on job re-run).
          gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1 && exit 0
          python3 .github/scripts/build_release_notes.py > "${RUNNER_TEMP}/notes.md"
          gh release create "${GITHUB_REF_NAME}" \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --notes-file "${RUNNER_TEMP}/notes.md"
