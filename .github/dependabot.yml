version: 2
updates:
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    # open-pull-requests-limit: 0 disables routine version-update PRs;
    # security updates are unaffected and stay enabled.
    open-pull-requests-limit: 0
    groups:
      security:
        applies-to: security-updates
        patterns:
          - "*"
