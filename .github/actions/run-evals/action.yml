name: Run evals
description: >-
  Set up uv + Python 3.13, install the eval dependency group, drive the eval
  gate for one behaviour category (or all), and upload the JSON report as an
  artifact. Shared by the publish gate (`publish-gate.yml`) and the on-demand
  workflow (`evals-on-demand.yml`) so they cannot drift on setup steps.

inputs:
  category:
    description: Behaviour category to run (triggers, safety, efficiency, orchestration, or all).
    required: false
    default: all
  model:
    description: LiteLLM model id (sets EVAL_MODEL).
    required: false
    default: openai/gpt-4o-mini
  runs:
    description: Runs per case (sets EVAL_RUNS).
    required: false
    default: "10"
  openai-api-key:
    description: OPENAI_API_KEY for the agent under test.
    required: true

runs:
  using: composite
  steps:
    - name: Install uv
      uses: astral-sh/setup-uv@v7

    - name: Set up Python
      shell: bash
      run: uv python install 3.13

    - name: Install eval dependencies
      shell: bash
      run: uv sync --group evals

    - name: Run eval gate (category ${{ inputs.category }})
      shell: bash
      env:
        OPENAI_API_KEY: ${{ inputs.openai-api-key }}
        EVAL_MODEL: ${{ inputs.model }}
        EVAL_RUNS: ${{ inputs.runs }}
      run: uv run python -m evals.run --category "${{ inputs.category }}"

    - name: Upload eval report
      if: always()
      uses: actions/upload-artifact@v7
      with:
        name: eval-report-${{ inputs.category }}
        path: evals/reports/
